<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
        span{
            color: green;
        }   
    </style>
</head>
<body>
    <h1>Introdução ao CSS</h1>

    <h2>Exemplos:</h2>

    <h3>Inline</h3>
    <p style="color: blue;">Parágrafo com fonte azul.</p>
    <p>Parágrafo com fonte cor padrão</p>
    <p style="color: red;">Parágrafo com fonte red.</p>

    <h3>Interno</h3>
    <span>Texto com fonte verde</span>

    <h3>Externo</h3>
    <div>Texto com fonte amarela.</div>
</body>
</html>
